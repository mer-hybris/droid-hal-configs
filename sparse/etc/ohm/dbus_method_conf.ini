[card_profile_changed]
name = cardProfileChanged
path = /com/sailfish/policy
interface = com.sailfish.policy
signature = ss
arguments = card_type,card_profile
target = card_profile_changed_request

[device_state_changed]
name = deviceStateChanged
path = /com/sailfish/policy
interface = com.sailfish.policy
signature = sii
arguments = accessory_name,accessory_driver,accessory_connected
target = accessory_request

[device_state_changed_many]
name = deviceStateChangedMany
path = /com/sailfish/policy
interface = com.sailfish.policy
signature = a(sii)
arguments = accessory_name,accessory_driver,accessory_connected
target = accessory_request
